<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>会員情報編集</title>

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #FFFFFF;
      color: #000000;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      font-size: 18px;
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #CC0000;
    }

    .back-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      margin-top: 10px;
    }

    .back-btn:hover {
      background: #F0F0F0;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>会員情報編集</h2>

  <label>氏名</label>
  <input type="text" id="name">

  <label>電話番号</label>
  <input type="tel" id="phone">

  <button onclick="updateUser()">更新する</button>

  <button class="back-btn" onclick="location.href='mypage.html'">
    マイページに戻る
  </button>

  <p id="result"></p>
</div>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";
const token = localStorage.getItem("access_token");

// 認証チェック
if (!token) {
  alert("ログインが必要です。");
  location.href = "login.html";
}

// 初期表示：現在の会員情報を読み込む
async function loadUser() {
  const res = await fetch(`${API_BASE}/me`, {
    headers: { "Authorization": `Bearer ${token}` }
  });

  const data = await res.json();
  document.getElementById("name").value = data.name;
  document.getElementById("phone").value = data.phone;
}

// 更新処理
async function updateUser() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const res = await fetch(`${API_BASE}/me`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ name, phone })
  });

  const data = await res.json();
  document.getElementById("result").textContent = data.message || "更新しました！";

  // 更新後マイページへ戻る
  setTimeout(() => {
    location.href = "mypage.html";
  }, 1000);
}

// 初期ロード
loadUser();
</script>

</body>
</html>
