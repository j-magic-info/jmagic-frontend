<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000000;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      color: #000000;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      color: #000000;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #FFFFFF;
      color: #000000;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      font-size: 18px;
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #CC0000;
    }

    .register-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      margin-top: 15px;
    }

    .register-btn:hover {
      background: #F0F0F0;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      color: #FF0000;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>ログイン</h2>

  <label>ログインID（メールアドレス）</label>
  <input type="text" id="loginId">

  <label>パスワード</label>
  <div class="password-wrapper">
    <input type="password" id="password">
    <span class="toggle-password" onclick="togglePassword('password')">👁</span>
  </div>

  <button onclick="login()">ログイン</button>

  <button class="register-btn" onclick="location.href='register.html'">
    新規会員登録はこちら
  </button>

  <p id="result"></p>
</div>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";

// パスワード表示切替
function togglePassword(id) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

// ログイン処理
async function login() {
  const loginId = document.getElementById("loginId").value;
  const password = document.getElementById("password").value;
  const result = document.getElementById("result");

  if (!loginId || !password) {
    result.textContent = "ログインIDとパスワードを入力してください。";
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ login_id: loginId, password })
    });

    const data = await res.json();

    // ★ バックエンドは token を返すので、これで成功判定する
    if (res.ok && data.token) {
      localStorage.setItem("access_token", data.token);
      result.style.color = "#00AA00";
      result.textContent = "ログイン成功！";

      setTimeout(() => {
        window.location.href = "mypage.html";
      }, 800);

    } else {
      result.style.color = "#FF0000";
      result.textContent = "ログイン失敗：" + JSON.stringify(data.detail || data.message || data);
    }

  } catch (error) {
    result.textContent = "通信エラー：" + error;
  }
}
</script>

</body>
</html>
