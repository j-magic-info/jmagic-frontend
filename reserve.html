<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>予約ページ</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000000;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      color: #000000;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #FFFFFF;
      color: #000000;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      font-size: 18px;
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #CC0000;
    }

    .back-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      margin-top: 15px;
    }

    .back-btn:hover {
      background: #F0F0F0;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      color: #FF0000;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>予約ページ</h2>

  <label>予約種別</label>
  <select id="reservationType"></select>

  <label>日付</label>
  <input type="text" id="datePicker">

  <label id="startLabel">開始時刻</label>
  <select id="startTime"></select>

  <label id="durationLabel">利用時間（AR/AP・BRのみ）</label>
  <select id="durationSelect"></select>

  <button onclick="reserve()">予約する</button>

  <button class="back-btn" onclick="location.href='mypage.html'">
    マイページに戻る
  </button>

  <p id="result"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";
const token = localStorage.getItem("access_token");

if (!token) {
  location.href = "login.html";
}

// 日付選択（水曜のみ休み）
flatpickr("#datePicker", {
  dateFormat: "Y-m-d",
  minDate: "today",
  disable: [
    function(date) {
      return date.getDay() === 3; // 水曜休み
    }
  ]
});

// 30分刻みの時間リスト生成
function generateTimes(startHour, endHour, include2030=false) {
  const times = [];
  for (let h = startHour; h <= endHour; h++) {
    ["00", "30"].forEach(m => {
      if (h === 20 && m === "30" && !include2030) return;
      times.push(`${String(h).padStart(2,"0")}:${m}`);
    });
  }
  return times;
}

// 予約種別読み込み
async function loadReservationTypes() {
  const select = document.getElementById("reservationType");
  select.innerHTML = "<option>読み込み中...</option>";

  const res = await fetch(`${API_BASE}/reservation-types`, {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();
  select.innerHTML = "";

  data.forEach(type => {
    const option = document.createElement("option");
    option.value = type.id;
    option.textContent = type.name;
    select.appendChild(option);
  });

  select.addEventListener("change", applyRules);
  applyRules();
}

// 種別ごとのルール適用
function applyRules() {
  const typeId = Number(document.getElementById("reservationType").value);
  const startTime = document.getElementById("startTime");
  const durationSelect = document.getElementById("durationSelect");
  const durationLabel = document.getElementById("durationLabel");

  startTime.innerHTML = "";
  durationSelect.innerHTML = "";
  durationSelect.style.display = "none";
  durationLabel.style.display = "none";

  if (typeId === 1 || typeId === 2) {
    // AR/AP・BR
    const startList = generateTimes(10, 20, false); // 20:00が最終
    startList.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      startTime.appendChild(opt);
    });

    durationSelect.style.display = "block";
    durationLabel.style.display = "block";
    for (let h = 1; h <= 5; h++) {
      const opt = document.createElement("option");
      opt.value = h;
      opt.textContent = `${h}時間`;
      durationSelect.appendChild(opt);
    }

  } else if (typeId === 3) {
    // 教室
    const dateStr = document.getElementById("datePicker").value;
    if (!dateStr) return;

    const d = new Date(dateStr);
    const dow = d.getDay(); // 0:日,1:月,2:火,3:水,4:木,5:金,6:土

    startTime.innerHTML = "";

    if (dow === 2 || dow === 4) {
      // 火・木：16,17,18
      ["16:00", "17:00", "18:00"].forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        startTime.appendChild(opt);
      });
    } else if (dow === 6) {
      // 土：12,13,14,16,17,18
      ["12:00", "13:00", "14:00", "16:00", "17:00", "18:00"].forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        startTime.appendChild(opt);
      });
    } else {
      // 他の曜日は休み
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "この曜日は教室休みです";
      startTime.appendChild(opt);
    }

  } else if (typeId === 4) {
    // 銃器保管
    const startList = generateTimes(10, 20, true); // 20:30まで
    startList.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      startTime.appendChild(opt);
    });
  }
}

// 予約送信
async function reserve() {
  const typeId = Number(document.getElementById("reservationType").value);
  const date = document.getElementById("datePicker").value;
  const start = document.getElementById("startTime").value;
  const duration = Number(document.getElementById("durationSelect").value);
  const result = document.getElementById("result");

  if (!date || !start) {
    result.textContent = "日付と開始時刻を入力してください。";
    return;
  }

  let endStr = "";

  if (typeId === 1 || typeId === 2) {
    // AR/AP・BR：開始＋利用時間（21:00超えないように）
    if (!duration) {
      result.textContent = "利用時間を選択してください。";
      return;
    }
    const startDate = new Date(`${date} ${start}`);
    let endDate = new Date(startDate.getTime() + duration * 60 * 60 * 1000);

    const closing = new Date(startDate);
    closing.setHours(21, 0, 0);
    if (endDate > closing) endDate = closing;

    endStr = endDate.toISOString().slice(0, 16).replace("T", " ");

  } else if (typeId === 3) {
    // 教室：1時間固定
    const startDate = new Date(`${date} ${start}`);
    const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);
    endStr = endDate.toISOString().slice(0, 16).replace("T", " ");

  } else if (typeId === 4) {
    // 銃器保管：15分固定
    const startDate = new Date(`${date} ${start}`);
    const endDate = new Date(startDate.getTime() + 15 * 60 * 1000);
    endStr = endDate.toISOString().slice(0, 16).replace("T", " ");
  }

  const res = await fetch(`${API_BASE}/reserve`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      reservation_type_id: typeId,
      start_datetime: `${date} ${start}`,
      end_datetime: endStr
    })
  });

  const data = await res.json();

  if (res.ok && data.success) {
    result.style.color = "#00AA00";
    result.textContent = "予約が完了しました！";
    setTimeout(() => location.href = "mypage.html", 1200);
  } else {
    result.style.color = "#FF0000";
    result.textContent = "予約失敗：" + JSON.stringify(data.detail || data.message);
  }
}

// 日付変更時に教室ルール再適用
document.getElementById("datePicker").addEventListener("change", () => {
  applyRules();
});

// 初期ロード
loadReservationTypes();
</script>

</body>
</html>
