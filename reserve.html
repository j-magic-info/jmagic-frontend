<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>予約ページ</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000000;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      color: #000000;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #FFFFFF;
      color: #000000;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      font-size: 18px;
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #CC0000;
    }

    .back-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      margin-top: 15px;
    }

    .back-btn:hover {
      background: #F0F0F0;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      color: #FF0000;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>予約ページ</h2>

  <label>予約種別</label>
  <select id="reservationType"></select>

  <label>日付</label>
  <input type="text" id="datePicker">

  <label id="startLabel">開始時刻</label>
  <select id="startTime"></select>

  <label id="endLabel">終了時刻</label>
  <select id="endTime"></select>

  <button onclick="reserve()">予約する</button>

  <button class="back-btn" onclick="location.href='mypage.html'">
    マイページに戻る
  </button>

  <p id="result"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";
const token = localStorage.getItem("access_token");

// flatpickr（日付のみ）
flatpickr("#datePicker", {
  dateFormat: "Y-m-d",
  minDate: "today",
  disable: [
    function(date) {
      return date.getDay() === 1; // 月曜休み
    }
  ]
});

// 30分刻みの時間リスト生成
function generateTimes(startHour, endHour, include2030=false) {
  const times = [];
  for (let h = startHour; h <= endHour; h++) {
    ["00", "30"].forEach(m => {
      if (h === 20 && m === "30" && !include2030) return;
      times.push(`${String(h).padStart(2,"0")}:${m}`);
    });
  }
  return times;
}

// 予約種別読み込み
async function loadReservationTypes() {
  const select = document.getElementById("reservationType");
  select.innerHTML = "<option>読み込み中...</option>";

  const res = await fetch(`${API_BASE}/reservation-types`, {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();
  select.innerHTML = "";

  data.forEach(type => {
    const option = document.createElement("option");
    option.value = type.id;
    option.textContent = type.name;
    select.appendChild(option);
  });

  select.addEventListener("change", applyRules);
  applyRules();
}

// 種別ごとのルール適用
function applyRules() {
  const typeId = Number(document.getElementById("reservationType").value);
  const startTime = document.getElementById("startTime");
  const endTime = document.getElementById("endTime");
  const endLabel = document.getElementById("endLabel");

  startTime.innerHTML = "";
  endTime.innerHTML = "";

  if (typeId === 1 || typeId === 2) {
    // AR/AP・BR
    const startList = generateTimes(10, 20, false);
    const endList = generateTimes(10, 21, false);

    startList.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      startTime.appendChild(opt);
    });

    endList.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      endTime.appendChild(opt);
    });

    endLabel.style.display = "block";
    endTime.style.display = "block";

  } else if (typeId === 3) {
    // 射撃教室
    startTime.innerHTML = "";
    ["10:00", "13:00", "15:00"].forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      startTime.appendChild(opt);
    });

    endLabel.style.display = "none";
    endTime.style.display = "none";

  } else if (typeId === 4) {
    // 銃器保管
    const startList = generateTimes(10, 20, true);

    startList.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      startTime.appendChild(opt);
    });

    endLabel.style.display = "none";
    endTime.style.display = "none";
  }
}

// 予約送信
async function reserve() {
  const typeId = Number(document.getElementById("reservationType").value);
  const date = document.getElementById("datePicker").value;
  const start = document.getElementById("startTime").value;
  const result = document.getElementById("result");

  if (!date || !start) {
    result.textContent = "日付と開始時刻を入力してください。";
    return;
  }

  let end = "";

  if (typeId === 1 || typeId === 2) {
    end = document.getElementById("endTime").value;
    if (!end) {
      result.textContent = "終了時刻を選択してください。";
      return;
    }
  } else if (typeId === 3) {
    // 教室：固定1時間
    const startDate = new Date(`${date} ${start}`);
    const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);
    end = endDate.toISOString().slice(0, 16).replace("T", " ");
  } else if (typeId === 4) {
    // 保管：固定15分
    const startDate = new Date(`${date} ${start}`);
    const endDate = new Date(startDate.getTime() + 15 * 60 * 1000);
    end = endDate.toISOString().slice(0, 16).replace("T", " ");
  }

  const res = await fetch(`${API_BASE}/reserve`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      reservation_type_id: typeId,
      start_datetime: `${date} ${start}`,
      end_datetime: end
    })
  });

  const data = await res.json();

  if (res.ok && data.success) {
    result.style.color = "#00AA00";
    result.textContent = "予約が完了しました！";
    setTimeout(() => location.href = "mypage.html", 1200);
  } else {
    result.style.color = "#FF0000";
    result.textContent = "予約失敗：" + JSON.stringify(data.detail || data.message);
  }
}

// 初期ロード
loadReservationTypes();
</script>

</body>
</html>
