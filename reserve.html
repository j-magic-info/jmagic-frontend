<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>予約ページ</title>

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000000;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      color: #000000;
    }

    select, input[type="datetime-local"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #FFFFFF;
      color: #000000;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      font-size: 18px;
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #CC0000;
    }

    .back-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      margin-top: 15px;
    }

    .back-btn:hover {
      background: #F0F0F0;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      color: #FF0000;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>予約ページ</h2>

  <label>予約種別</label>
  <select id="reservationType"></select>

  <label>開始日時</label>
  <input type="datetime-local" id="startDatetime">

  <label>終了日時</label>
  <input type="datetime-local" id="endDatetime">

  <button onclick="reserve()">予約する</button>

  <button class="back-btn" onclick="location.href='mypage.html'">
    マイページに戻る
  </button>

  <p id="result"></p>
</div>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";

// JWT チェック
const token = localStorage.getItem("access_token");
if (!token) {
  window.location.href = "login.html";
}

// 予約種別を読み込む
async function loadReservationTypes() {
  const select = document.getElementById("reservationType");
  select.innerHTML = "<option>読み込み中...</option>";

  try {
    const res = await fetch(`${API_BASE}/reservation-types`);
    const data = await res.json();

    select.innerHTML = "";

    data.forEach(type => {
      const option = document.createElement("option");
      option.value = type.id;
      option.textContent = type.name;
      select.appendChild(option);
    });

  } catch (error) {
    select.innerHTML = "<option>読み込み失敗</option>";
  }
}

// 予約送信
async function reserve() {
  const typeId = document.getElementById("reservationType").value;
  const start = document.getElementById("startDatetime").value;
  const end = document.getElementById("endDatetime").value;
  const result = document.getElementById("result");

  if (!typeId || !start || !end) {
    result.textContent = "すべての項目を入力してください。";
    return;
  }

  // datetime-local → API のフォーマットへ変換
  const startFormatted = start.replace("T", " ");
  const endFormatted = end.replace("T", " ");

  try {
    const res = await fetch(`${API_BASE}/reserve`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        reservation_type_id: Number(typeId),
        start_datetime: startFormatted,
        end_datetime: endFormatted
      })
    });

    const data = await res.json();

    if (res.ok && data.success) {
      result.style.color = "#00AA00";
      result.textContent = "予約が完了しました！";

      setTimeout(() => {
        window.location.href = "mypage.html";
      }, 1200);

    } else {
      result.style.color = "#FF0000";
      result.textContent = "予約失敗：" + JSON.stringify(data.detail || data.message);
    }

  } catch (error) {
    result.textContent = "通信エラー：" + error;
  }
}

// 初期ロード
loadReservationTypes();
</script>

</body>
</html>
