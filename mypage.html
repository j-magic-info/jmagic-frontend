<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイページ</title>

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000000;
    }

    .section-title {
      font-weight: bold;
      margin-top: 25px;
      margin-bottom: 10px;
      font-size: 18px;
      border-left: 5px solid #FF0000;
      padding-left: 8px;
    }

    .reservation-box {
      border: 2px solid #000000;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      background: #F8F8F8;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background: #CC0000;
    }

    .logout-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      width: 100%;
      margin-top: 25px;
    }

    .logout-btn:hover {
      background: #F0F0F0;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      color: #FF0000;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>マイページ</h2>

  <div id="userInfo"></div>

  <div class="section-title">予約一覧</div>
  <div id="reservationList"></div>

  <button class="logout-btn" onclick="logout()">ログアウト</button>

  <p id="result"></p>
</div>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";

// JWT が無ければログインへ
const token = localStorage.getItem("access_token");
if (!token) {
  window.location.href = "login.html";
}

// ユーザー情報（JWT から名前を取得）
function loadUserInfo() {
  const payload = JSON.parse(atob(token.split(".")[1]));
  const name = payload.name;

  document.getElementById("userInfo").innerHTML = `
    <div class="section-title">会員情報</div>
    <p><b>お名前：</b> ${name}</p>
  `;
}

// 予約一覧を取得
async function loadReservations() {
  const list = document.getElementById("reservationList");
  list.innerHTML = "読み込み中...";

  try {
    const res = await fetch(`${API_BASE}/my-reservations`, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    if (!res.ok) {
      list.innerHTML = "予約情報の取得に失敗しました。";
      return;
    }

    if (data.length === 0) {
      list.innerHTML = "<p>予約はありません。</p>";
      return;
    }

    list.innerHTML = "";

    data.forEach(r => {
      const box = document.createElement("div");
      box.className = "reservation-box";

      box.innerHTML = `
        <p><b>種別：</b> ${r.reservation_type}</p>
        <p><b>開始：</b> ${r.start_datetime}</p>
        <p><b>終了：</b> ${r.end_datetime}</p>
        <button onclick="cancelReservation(${r.reservation_id})">キャンセル</button>
      `;

      list.appendChild(box);
    });

  } catch (error) {
    list.innerHTML = "通信エラー：" + error;
  }
}

// 予約キャンセル
async function cancelReservation(id) {
  if (!confirm("本当にキャンセルしますか？")) return;

  try {
    const res = await fetch(`${API_BASE}/cancel-reservation`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ reservation_id: id })
    });

    const data = await res.json();

    if (res.ok) {
      alert("予約をキャンセルしました。");
      loadReservations();
    } else {
      alert("キャンセル失敗：" + JSON.stringify(data.detail || data.message));
    }

  } catch (error) {
    alert("通信エラー：" + error);
  }
}

// ログアウト
function logout() {
  localStorage.removeItem("access_token");
  window.location.href = "login.html";
}

// 初期ロード
loadUserInfo();
loadReservations();
</script>

</body>
</html>
