<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイページ</title>

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .section-title {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 2px solid #000000;
      padding-bottom: 5px;
    }

    #userInfoBox {
      border: 1px solid #000;
      padding: 12px;
      border-radius: 6px;
      background: #F9F9F9;
      margin-top: 10px;
    }

    .small-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .small-btn:hover {
      background: #F0F0F0;
    }

    .logout-btn {
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      margin-top: 25px;
      padding: 14px;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
    }

    .logout-btn:hover {
      background: #CC0000;
    }

    .reservation-item {
      border: 1px solid #000000;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    .cancel-btn {
      background: #FFFFFF;
      color: #FF0000;
      border: 2px solid #FF0000;
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
      width: 100%;
      border-radius: 6px;
    }

    .cancel-btn:hover {
      background: #FFE5E5;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>マイページ</h2>

  <!-- 会員情報（表示のみ） -->
  <div class="section-title">会員情報</div>

  <div id="userInfoBox">
    <div><strong>ログインID（メールアドレス）：</strong> <span id="loginIdDisplay"></span></div>
    <div><strong>氏名：</strong> <span id="nameDisplay"></span></div>
    <div><strong>電話番号：</strong> <span id="phoneDisplay"></span></div>
  </div>

  <button class="small-btn" onclick="location.href='edit_profile.html'">
    会員情報を変更する
  </button>

  <button class="small-btn" onclick="location.href='reserve.html'">
    予約フォームへ進む
  </button>

  <button class="logout-btn" onclick="logout()">
    ログアウト
  </button>

  <!-- 未来の予約一覧 -->
  <div class="section-title">未来の予約一覧</div>
  <div id="futureReservations"></div>

  <!-- 過去の予約一覧 -->
  <div class="section-title">過去の予約一覧</div>
  <div id="pastReservations"></div>

  <p id="result"></p>
</div>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";
const token = localStorage.getItem("access_token");

// 認証チェック
if (!token) {
  alert("ログインが必要です。");
  location.href = "login.html";
}

// ログアウト処理
function logout() {
  const ok = confirm("本当にログアウトしますか？");

  if (ok) {
    localStorage.removeItem("access_token");
    alert("ログアウトしました。");
    location.href = "login.html";
  }
}

// 会員情報読み込み（表示のみ）
async function loadUser() {
  const res = await fetch(`${API_BASE}/me`, {
    headers: { "Authorization": `Bearer ${token}` }
  });

  if (!res.ok) {
    alert("ログインが必要です。");
    location.href = "login.html";
    return;
  }

  const data = await res.json();

  document.getElementById("loginIdDisplay").textContent = data.login_id;
  document.getElementById("nameDisplay").textContent = data.name;
  document.getElementById("phoneDisplay").textContent = data.phone;
}

// 予約一覧読み込み
async function loadReservations() {
  const futureRes = await fetch(`${API_BASE}/my-reservations?type=future`, {
    headers: { "Authorization": `Bearer ${token}` }
  });
  const futureData = await futureRes.json();

  const pastRes = await fetch(`${API_BASE}/my-reservations?type=past`, {
    headers: { "Authorization": `Bearer ${token}` }
  });
  const pastData = await pastRes.json();

  renderReservations("futureReservations", futureData, true);
  renderReservations("pastReservations", pastData, false);
}

// 予約表示
function renderReservations(targetId, list, canCancel) {
  const target = document.getElementById(targetId);
  target.innerHTML = "";

  list.forEach(r => {
    const div = document.createElement("div");
    div.className = "reservation-item";
    div.innerHTML = `
      <div>${r.start} 〜 ${r.end}</div>
      <div>${r.type}</div>
    `;

    if (canCancel) {
      const btn = document.createElement("button");
      btn.className = "cancel-btn";
      btn.textContent = "キャンセル";
      btn.onclick = () => cancelReservation(r.id);
      div.appendChild(btn);
    }

    target.appendChild(div);
  });
}

// キャンセル処理
async function cancelReservation(id) {
  const res = await fetch(`${API_BASE}/cancel-reservation/${id}`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${token}` }
  });

  const data = await res.json();
  alert(data.message || "キャンセルしました");
  loadReservations();
}

// 初期ロード
loadUser();
loadReservations();
</script>

</body>
</html>
