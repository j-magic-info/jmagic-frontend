<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイページ</title>

  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #FFFFFF;
      padding: 30px;
      color: #000000;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: #FFFFFF;
      padding: 25px;
      border-radius: 12px;
      border: 2px solid #000000;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #FFFFFF;
      color: #000000;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      font-size: 18px;
      background: #FF0000;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #CC0000;
    }

    .small-btn {
      background: #FFFFFF;
      color: #000000;
      border: 2px solid #000000;
      margin-top: 10px;
    }

    .small-btn:hover {
      background: #F0F0F0;
    }

    .section-title {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 2px solid #000000;
      padding-bottom: 5px;
    }

    .reservation-item {
      border: 1px solid #000000;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    .cancel-btn {
      background: #FFFFFF;
      color: #FF0000;
      border: 2px solid #FF0000;
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
      width: 100%;
      border-radius: 6px;
    }

    .cancel-btn:hover {
      background: #FFE5E5;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>マイページ</h2>

  <!-- 会員情報 -->
  <div class="section-title">会員情報</div>

  <label>氏名</label>
  <input type="text" id="name">

  <label>電話番号</label>
  <input type="tel" id="phone">

  <button onclick="updateUser()">会員情報を更新する</button>

  <button class="small-btn" onclick="location.href='reserve.html'">
    予約フォームへ進む
  </button>

  <!-- 未来の予約一覧 -->
  <div class="section-title">未来の予約一覧</div>
  <div id="futureReservations"></div>

  <!-- 過去の予約一覧 -->
  <div class="section-title">過去の予約一覧</div>
  <div id="pastReservations"></div>

  <p id="result"></p>
</div>

<script>
const API_BASE = "https://jmagic-fastapi.onrender.com";
const token = localStorage.getItem("token");

// 認証チェック
if (!token) {
  alert("ログインが必要です。");
  location.href = "login.html";
}

// 会員情報読み込み
async function loadUser() {
  const res = await fetch(`${API_BASE}/me`, {
    headers: { "Authorization": `Bearer ${token}` }
  });
  const data = await res.json();

  document.getElementById("name").value = data.name;
  document.getElementById("phone").value = data.phone;
}

// 会員情報更新
async function updateUser() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const res = await fetch(`${API_BASE}/me`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({ name, phone })
  });

  const data = await res.json();
  document.getElementById("result").textContent = data.message || "更新しました！";
}

// 予約一覧読み込み
async function loadReservations() {
  const futureRes = await fetch(`${API_BASE}/my-reservations?type=future`, {
    headers: { "Authorization": `Bearer ${token}` }
  });
  const futureData = await futureRes.json();

  const pastRes = await fetch(`${API_BASE}/my-reservations?type=past`, {
    headers: { "Authorization": `Bearer ${token}` }
  });
  const pastData = await pastRes.json();

  renderReservations("futureReservations", futureData, true);
  renderReservations("pastReservations", pastData, false);
}

// 予約表示
function renderReservations(targetId, list, canCancel) {
  const target = document.getElementById(targetId);
  target.innerHTML = "";

  list.forEach(r => {
    const div = document.createElement("div");
    div.className = "reservation-item";
    div.innerHTML = `
      <div>${r.start} 〜 ${r.end}</div>
      <div>${r.type}</div>
    `;

    if (canCancel) {
      const btn = document.createElement("button");
      btn.className = "cancel-btn";
      btn.textContent = "キャンセル";
      btn.onclick = () => cancelReservation(r.id);
      div.appendChild(btn);
    }

    target.appendChild(div);
  });
}

// キャンセル処理
async function cancelReservation(id) {
  const res = await fetch(`${API_BASE}/cancel-reservation/${id}`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${token}` }
  });

  const data = await res.json();
  alert(data.message || "キャンセルしました");
  loadReservations();
}

// 初期ロード
loadUser();
loadReservations();
</script>

</body>
</html>
